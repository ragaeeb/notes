name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    semantic-release:
        if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, 'chore(release)') && !contains(github.event.head_commit.message, '[skip ci]')) }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Semantic Release
              uses: cycjimmy/semantic-release-action@v4
              with:
                  semantic_version: 25
                  extra_plugins: |
                      @semantic-release/changelog@6.0.3
                      @semantic-release/git@10.0.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
